<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrining Tamu - PT Santosa Agrindo Farm Bekri</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #1b5e20; text-align: center; margin-bottom: 5px; font-size: 20px; text-transform: uppercase; }
        p.subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 25px; }
        .divider { height: 4px; background: #2e7d32; width: 60px; margin: 0 auto 20px; border-radius: 2px; }
        
        .field { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #444; }
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 14px; }
        input:focus { border-color: #2e7d32; outline: none; box-shadow: 0 0 0 3px rgba(46,125,50,0.1); }
        
        .q-section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #e9ecef; }
        .q-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .q-item:last-child { border-bottom: none; margin-bottom: 0; }

        button { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #1b5e20; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #result { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; text-align: center; font-size: 20px; font-weight: bold; }
        .status-DITERIMA { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .status-TERBATAS { background: #fff3cd; color: #856404; border: 2px solid #ffeeba; }
        .status-DITOLAK { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Skrining Tamu</h2>
    <h2>PT Santosa Agrindo Farm Bekri</h2>
    <p class="subtitle">Prosedur Biosekuriti Pencegahan Wabah PMK</p>
    <div class="divider"></div>
    
    <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Nama sesuai identitas">
    </div>
    <div class="field">
        <label>NIK (Hanya Angka - 16 Digit)</label>
        <input type="text" id="nik" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="Contoh: 1801...">
    </div>
    <div class="field">
        <label>No. HP / WhatsApp (Hanya Angka)</label>
        <input type="text" id="hp" maxlength="15" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="Contoh: 0812...">
    </div>
    <div class="field">
        <label>Instansi / Perusahaan</label>
        <input type="text" id="instansi" placeholder="Contoh: PT. ABC / Dinas / Pribadi">
    </div>
    <div class="field">
        <label>Alamat Asal / Domisili</label>
        <input type="text" id="alamat" placeholder="Kota / Kabupaten">
    </div>

    <div class="q-section">
        <div class="q-item">
            <label>1. Dalam 72 jam (3 hari) terakhir, apakah Anda mengunjungi peternakan sapi/kambing/babi lain?</label>
            <select id="q1" style="width:100%">
                <option value="0">Tidak</option>
                <option value="40">Ya</option>
            </select>
        </div>
        <div class="q-item">
            <label>2. Apakah Anda memiliki ternak berkuku belah di rumah yang sedang sakit?</label>
            <select id="q2" style="width:100%">
                <option value="0">Tidak</option>
                <option value="50">Ya</option>
            </select>
        </div>
        <div class="q-item">
            <label>3. Apakah Anda melakukan kontak langsung dengan hewan ternak dalam 24 jam terakhir?</label>
            <select id="q3" style="width:100%">
                <option value="0">Tidak</option>
                <option value="40">Ya</option>
            </select>
        </div>
        <div class="q-item">
            <label>4. Apakah Anda membawa produk asal hewan (daging mentah, susu segar, olahan kulit) saat ini?</label>
            <select id="q4" style="width:100%">
